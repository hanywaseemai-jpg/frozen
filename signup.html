<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - FrozenShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            --background-color: #0f172a;
            --card-background: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #0891b2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: var(--card-background);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            position: relative;
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-img {
            height: 65px;
            object-fit: contain;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 14px;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 13px 45px 13px 15px; /* مسافة لعدم تداخل النص مع الأيقونة */
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
        }

        input:focus + i {
            color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(6, 182, 212, 0.3);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
        }

        .login-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            display: flex;
        }

        .alert-success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            display: flex;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="logo-wrapper">
            <img src="https://frozen-ordering.vercel.app/logo.png" alt="FrozenShop Logo" class="logo-img">
        </div>

        <h1>إنشاء حساب جديد</h1>
        <p class="subtitle">سجل الآن لتتمكن من تسوق أشهى المأكولات وتتبع طلباتك</p>

        <div id="alertBox" class="alert"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="fullName" required placeholder="الاسم الثنائي أو الثلاثي">
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <div class="input-icon-wrapper">
                    <input type="email" id="email" required placeholder="name@example.com">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="password" required placeholder="لا تقل عن 6 خانات">
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="confirmPassword" required placeholder="أعد إدخال كلمة المرور">
                    <i class="fas fa-shield-alt"></i>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-user-plus"></i> إتمام التسجيل
            </button>
        </form>

        <div class="login-link">
            لديك حساب بالفعل؟ <a href="login.html">سجل الدخول هنا</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // تعريف نظيف وواحد فقط بدون أي تكرار
        const SUPABASE_URL = 'https://ufmzgobtjtetrxvewvxl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DEZTCSDOUIcSzs_t0tOAqA_HVOdy8As';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleSignup(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            // إعادة تهيئة التنبيهات
            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            try {
                if (password !== confirmPassword) {
                    throw new Error('كلمتا المرور غير متطابقتين، يرجى التحقق مجدداً.');
                }
                if (password.length < 6) {
                    throw new Error('يجب أن تتكون كلمة المرور من 6 خانات على الأقل.');
                }

                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> جاري إنشاء الحساب...';

                // تسجيل المستخدم في نظام سوبابيز
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                if (error) throw error;

                alertBox.innerHTML = '<i class="fas fa-check-circle"></i> تم إنشاء حسابك بنجاح! جاري الانتقال لصفحة تسجيل الدخول...';
                alertBox.classList.add('alert-success');
                alertBox.style.display = 'flex';

                // التوجيه لصفحة تسجيل الدخول ليدخل منها بشكل رسمي وآمن
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                alertBox.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message}`;
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'flex';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> إتمام التسجيل';
            }
        }
    </script>
</body>
</html>
