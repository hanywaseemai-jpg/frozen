<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب جديد - FrozenShop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  :root{
    --ink:#0a0a0a;
    --ink-soft:#1c1c1c;
    --paper:#ffffff;
    --mist:#f4f4f3;
    --line:#e4e4e1;
    --ash:#6f6f6c;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Cairo',sans-serif;
    background:var(--mist);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  a{font-family:inherit;}

  .home-pill{
    position:fixed;
    top:24px;
    right:24px;
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink);
    text-decoration:none;
    font-weight:700;
    font-size:13.5px;
    padding:10px 18px;
    border-radius:999px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
    transition:background .15s ease, color .15s ease, transform .15s ease;
    z-index:10;
  }
  .home-pill:hover{background:var(--ink);color:#fff;transform:translateY(-1px);}
  .home-pill i{font-size:13px;}

  .auth-shell{width:100%;max-width:980px;}

  .auth-card{
    display:flex;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }

  .auth-aside{
    flex:0 0 36%;
    background:var(--ink);
    color:#fff;
    position:relative;
    padding:48px 36px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
    min-height:640px;
  }
  .frost-art{position:absolute;inset:0;width:100%;height:100%;opacity:.5;}
  .logo-badge{
    position:relative;z-index:1;display:inline-flex;background:#fff;
    border-radius:16px;padding:14px 18px;width:fit-content;
  }
  .logo-badge img{height:34px;display:block;object-fit:contain;}
  .aside-copy{position:relative;z-index:1;}
  .aside-tagline{font-weight:600;font-size:15px;line-height:1.9;color:rgba(255,255,255,.82);}
  .aside-points{list-style:none;margin-top:22px;display:flex;flex-direction:column;gap:10px;}
  .aside-points li{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.85);}
  .aside-points i{font-size:12px;color:#fff;}

  .auth-panel{flex:1;padding:48px 48px;display:flex;flex-direction:column;justify-content:center;}

  h1{font-size:25px;font-weight:800;color:var(--ink);margin-bottom:6px;}
  .panel-subtitle{color:var(--ash);font-size:14px;font-weight:600;margin-bottom:24px;}

  .form-group{margin-bottom:16px;}
  label{display:block;margin-bottom:7px;color:var(--ink);font-weight:700;font-size:13.5px;}
  .input-icon-wrapper{position:relative;}
  .input-icon-wrapper i{position:absolute;top:50%;right:15px;transform:translateY(-50%);color:var(--ash);font-size:15px;}
  input{
    width:100%;padding:13px 44px 13px 15px;border:1.5px solid var(--line);border-radius:10px;
    font-size:14px;font-family:'Cairo',sans-serif;color:var(--ink);background:var(--mist);
    transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  input:focus{outline:none;border-color:var(--ink);background:#fff;box-shadow:0 0 0 3px rgba(10,10,10,.07);}

  .terms-row{
    display:flex;align-items:flex-start;gap:9px;margin-bottom:22px;font-size:13px;
    font-weight:600;color:var(--ash);line-height:1.7;
  }
  .terms-row input{width:auto;accent-color:var(--ink);cursor:pointer;margin-top:3px;}
  .terms-row a{color:var(--ink);font-weight:700;text-decoration:none;}
  .terms-row a:hover{text-decoration:underline;}

  .btn{
    width:100%;padding:14px;background:var(--ink);color:#fff;border:none;border-radius:10px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:background .15s ease, transform .15s ease;
  }
  .btn:hover{background:var(--ink-soft);transform:translateY(-1px);}
  .btn:disabled{opacity:.65;cursor:not-allowed;transform:none;}

  .panel-footer-links{text-align:center;margin-top:20px;color:var(--ash);font-size:13.5px;font-weight:600;}
  .panel-footer-links a{color:var(--ink);text-decoration:none;font-weight:700;}
  .panel-footer-links a:hover{text-decoration:underline;}

  .alert{
    padding:13px 14px;border-radius:10px;margin-bottom:18px;font-size:13.5px;
    font-weight:600;display:none;align-items:center;gap:10px;
  }
  .alert-error{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;display:flex;}
  .alert-success{background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;display:flex;}
  .loader{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .trust-footer{
    margin-top:26px;padding-top:18px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:12.5px;color:var(--ash);flex-wrap:wrap;
  }
  .trust-footer a{color:var(--ash);text-decoration:none;font-weight:600;}
  .trust-footer a:hover{color:var(--ink);}
  .trust-footer .dot{color:var(--line);}
  .trust-footer .contact-icons{display:inline-flex;gap:10px;}
  .trust-footer .contact-icons a{font-size:15px;}

  @media (max-width:860px){
    .auth-card{flex-direction:column;border-radius:18px;}
    .auth-aside{min-height:0;padding:30px 26px;}
    .frost-art{opacity:.4;}
    .logo-badge{padding:10px 14px;}
    .logo-badge img{height:26px;}
    .aside-tagline{font-size:13.5px;margin-top:14px;}
    .aside-points{display:none;}
    .auth-panel{padding:34px 26px;}
    .home-pill{top:16px;right:16px;font-size:12.5px;padding:8px 14px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>

  <a href="index.html" class="home-pill"><i class="fas fa-house"></i> الرئيسية</a>

  <div class="auth-shell">
    <div class="auth-card">

      <aside class="auth-aside">
        <svg class="frost-art" viewBox="0 0 360 640" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" fill="none">
            <g opacity="0.5" transform="translate(80,100)">
              <line x1="0" y1="-46" x2="0" y2="46"/>
              <line x1="-40" y1="-23" x2="40" y2="23"/>
              <line x1="-40" y1="23" x2="40" y2="-23"/>
              <line x1="0" y1="-34" x2="-12" y2="-44"/><line x1="0" y1="-34" x2="12" y2="-44"/>
              <line x1="0" y1="34" x2="-12" y2="44"/><line x1="0" y1="34" x2="12" y2="44"/>
              <line x1="-30" y1="-17" x2="-22" y2="-30"/><line x1="-30" y1="-17" x2="-18" y2="-6"/>
              <line x1="30" y1="17" x2="22" y2="30"/><line x1="30" y1="17" x2="18" y2="6"/>
            </g>
            <g opacity="0.3" transform="translate(300,300) scale(0.55)">
              <line x1="0" y1="-46" x2="0" y2="46"/>
              <line x1="-40" y1="-23" x2="40" y2="23"/>
              <line x1="-40" y1="23" x2="40" y2="-23"/>
              <line x1="0" y1="-34" x2="-12" y2="-44"/><line x1="0" y1="-34" x2="12" y2="-44"/>
              <line x1="0" y1="34" x2="-12" y2="44"/><line x1="0" y1="34" x2="12" y2="44"/>
            </g>
            <g opacity="0.4" transform="translate(120,500) scale(0.75)">
              <line x1="0" y1="-46" x2="0" y2="46"/>
              <line x1="-40" y1="-23" x2="40" y2="23"/>
              <line x1="-40" y1="23" x2="40" y2="-23"/>
              <line x1="-30" y1="-17" x2="-22" y2="-30"/><line x1="-30" y1="-17" x2="-18" y2="-6"/>
              <line x1="30" y1="17" x2="22" y2="30"/><line x1="30" y1="17" x2="18" y2="6"/>
            </g>
          </g>
        </svg>

        <div class="logo-badge">
          <img src="https://frozen-ordering.vercel.app/logo.png" alt="FrozenShop">
        </div>

        <div class="aside-copy">
          <p class="aside-tagline">انضم لعملاء FrozenShop واطلب أشهى الأطعمة المجمدة بضغطة واحدة.</p>
          <ul class="aside-points">
            <li><i class="fas fa-circle-check"></i> توصيل سريع لباب البيت</li>
            <li><i class="fas fa-circle-check"></i> تتبع الطلبات لحظة بلحظة</li>
            <li><i class="fas fa-circle-check"></i> عروض وخصومات لأعضائنا</li>
          </ul>
        </div>
      </aside>

      <div class="auth-panel">
        <h1>إنشاء حساب جديد</h1>
        <p class="panel-subtitle">سجل الآن لتتمكن من تسوق أشهى المأكولات وتتبع طلباتك</p>

        <div id="alertBox" class="alert" role="alert"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="fullName">الاسم الكامل</label>
            <div class="input-icon-wrapper">
              <input type="text" id="fullName" required placeholder="الاسم الثنائي أو الثلاثي" autocomplete="name">
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="email">البريد الإلكتروني</label>
            <div class="input-icon-wrapper">
              <input type="email" id="email" required placeholder="name@example.com" autocomplete="email">
              <i class="fas fa-envelope"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="password">كلمة المرور</label>
            <div class="input-icon-wrapper">
              <input type="password" id="password" required placeholder="لا تقل عن 6 خانات" autocomplete="new-password">
              <i class="fas fa-lock"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">تأكيد كلمة المرور</label>
            <div class="input-icon-wrapper">
              <input type="password" id="confirmPassword" required placeholder="أعد إدخال كلمة المرور" autocomplete="new-password">
              <i class="fas fa-shield-halved"></i>
            </div>
          </div>

          <label class="terms-row">
            <input type="checkbox" id="agreeTerms" required>
            <span>أوافق على <a href="terms.html">الشروط والأحكام</a> و<a href="privacy-policy.html">سياسة الخصوصية</a> الخاصة بـ FrozenShop</span>
          </label>

          <button type="submit" class="btn" id="submitBtn">
            <i class="fas fa-user-plus"></i> إتمام التسجيل
          </button>
        </form>

        <div class="panel-footer-links">
          لديك حساب بالفعل؟ <a href="login.html">سجل الدخول هنا</a>
        </div>

        <div class="trust-footer">
          <a href="privacy-policy.html">سياسة الخصوصية</a>
          <span class="dot">•</span>
          <a href="terms.html">الشروط والأحكام</a>
          <span class="dot">•</span>
          <span class="contact-icons">
            <a href="tel:+201001234567" title="اتصل بنا"><i class="fas fa-phone"></i></a>
            <a href="https://wa.me/201001234567" target="_blank" rel="noopener" title="واتساب"><i class="fab fa-whatsapp"></i></a>
          </span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script>
    async function handleSignup(e) {
      e.preventDefault();
      var fullName = document.getElementById('fullName').value.trim();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;
      var agreeTerms = document.getElementById('agreeTerms').checked;
      var btn = document.getElementById('submitBtn');
      var alertBox = document.getElementById('alertBox');

      alertBox.style.display = 'none';
      alertBox.className = 'alert';

      try {
        if (!agreeTerms) throw new Error('يجب الموافقة على الشروط والأحكام وسياسة الخصوصية للاستمرار.');
        if (password !== confirmPassword) throw new Error('كلمتا المرور غير متطابقتين.');
        if (password.length < 6) throw new Error('يجب أن تتكون كلمة المرور من 6 خانات على الأقل.');

        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> جاري إنشاء الحساب...';

        var result = await sb.auth.signUp({
          email: email,
          password: password,
          options: { data: { full_name: fullName } }
        });
        if (result.error) throw result.error;

        alertBox.innerHTML = '<i class="fas fa-circle-check"></i> تم إنشاء حسابك بنجاح! جاري الانتقال لصفحة تسجيل الدخول...';
        alertBox.classList.add('alert-success');
        alertBox.style.display = 'flex';

        setTimeout(function () { window.location.href = 'login.html'; }, 2000);

      } catch (err) {
        alertBox.innerHTML = '<i class="fas fa-circle-exclamation"></i> ' + FS.escapeHTML(err.message || 'حدث خطأ غير متوقع.');
        alertBox.classList.add('alert-error');
        alertBox.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> إتمام التسجيل';
      }
    }
  </script>
</body>
</html>
