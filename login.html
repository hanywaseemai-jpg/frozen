<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - FrozenShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --background-color: #0f172a;
            --card-background: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary-color: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--card-background);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 430px;
            width: 100%;
        }

        .logo-wrapper { text-align: center; margin-bottom: 25px; }
        .logo-img { height: 65px; object-fit: contain; }
        h1 { text-align: center; color: var(--text-main); font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px; font-weight: 600; }
        .form-group { margin-bottom: 22px; position: relative; }
        label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 700; font-size: 14px; }
        .input-icon-wrapper { position: relative; }
        
        .input-icon-wrapper i {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .remember-forgot { margin-bottom: 25px; font-size: 14px; font-weight: 600; }
        .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-main); }
        .remember input { width: auto; cursor: pointer; }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .signup-link { text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 14px; font-weight: 600; }
        .signup-link a { color: var(--primary-color); text-decoration: none; font-weight: 700; }
        .signup-link a:hover { text-decoration: underline; }

        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; display: flex; }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; display: flex; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-wrapper">
            <img src="https://frozen-ordering.vercel.app/logo.png" alt="FrozenShop Logo" class="logo-img">
        </div>
        
        <h1>تسجيل الدخول</h1>
        <p class="subtitle">أهلاً بك مجدداً في متجر الأطعمة المجمدة</p>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <div class="input-icon-wrapper">
                    <input type="email" id="email" required placeholder="kevin.hany.08@hotmail.com">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    <span>تذكرني على هذا الجهاز</span>
                </label>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </form>

        <div class="signup-link">
            ليس لديك حساب حالياً؟ <a href="signup.html">سجل حساباً جديداً</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // تعريف واحد وصريح بدون أي تكرار نهائياً في الملف
        const SUPABASE_URL = 'https://ufmzgobtjtetrxvewvxl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DEZTCSDOUIcSzs_t0tOAqA_HVOdy8As';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const parsed = JSON.parse(savedUser);
                if (parsed.email === 'kevin.hany.08@hotmail.com') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> جاري التحقق من الحساب...';

            try {
                if (!email.includes('@')) throw new Error('صيغة البريد الإلكتروني غير صحيحة.');
                if (password.length < 6) throw new Error('كلمة المرور يجب ألا تقل عن 6 أحرف.');

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                const sessionUser = {
                    id: data.user.id,
                    email: data.user.email,
                    name: data.user.user_metadata.full_name || email.split('@')[0],
                    joinDate: data.user.created_at
                };

                localStorage.setItem('user', JSON.stringify(sessionUser));

                if (document.getElementById('remember').checked) {
                    localStorage.setItem('rememberMe', 'true');
                }

                alertBox.innerHTML = '<i class="fas fa-check-circle"></i> تم تسجيل الدخول بنجاح! جاري التوجيه...';
                alertBox.classList.add('alert-success');
                alertBox.style.display = 'flex';

                setTimeout(() => {
                    if (email.toLowerCase() === 'kevin.hany.08@hotmail.com') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1200);

            } catch (err) {
                alertBox.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message}`;
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'flex';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
            }
        }
    </script>
</body>
</html>
