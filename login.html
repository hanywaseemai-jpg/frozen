<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - FrozenShop</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232B1810'/%3E%3Cpath d='M32 14v36M16 23l32 18M16 41l32-18' stroke='%23E2622A' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Lalezar&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  :root{
    --ink:#2B1810;
    --ink-soft:#4A2D1C;
    --paper:#ffffff;
    --mist:#FBF4EA;
    --line:#E8D5B8;
    --ash:#8A6F5C;
    --primary:#E2622A;
    --primary-dark:#B8481C;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Cairo',sans-serif;
    background:var(--mist);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  a{font-family:inherit;}

  /* Home button — fixed, always reachable */
  .home-pill{
    position:fixed;
    top:24px;
    right:24px;
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink);
    text-decoration:none;
    font-weight:700;
    font-size:13.5px;
    padding:10px 18px;
    border-radius:999px;
    box-shadow:0 1px 2px rgba(43,24,16,.06);
    transition:background .15s ease, color .15s ease, transform .15s ease;
    z-index:10;
  }
  .home-pill:hover{background:var(--ink);color:#fff;transform:translateY(-1px);}
  .home-pill i{font-size:13px;}

  .auth-shell{width:100%;max-width:940px;}

  .auth-card{
    display:flex;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(43,24,16,.08);
  }

  /* Dark brand panel with rising steam motif */
  .auth-aside{
    flex:0 0 38%;
    background:var(--ink);
    color:#fff;
    position:relative;
    padding:48px 36px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
    min-height:560px;
  }
  .steam-art{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:.9;
  }
  .logo-badge{
    position:relative;
    z-index:1;
    display:inline-flex;
    background:#fff;
    border-radius:16px;
    padding:14px 18px;
    width:fit-content;
  }
  .logo-badge img{height:34px;display:block;object-fit:contain;}
  .aside-copy{position:relative;z-index:1;}
  .aside-tagline{
    font-weight:600;
    font-size:15px;
    line-height:1.9;
    color:rgba(255,255,255,.85);
  }

  .auth-panel{
    flex:1;
    padding:52px 48px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  h1{font-family:'Lalezar','Cairo',sans-serif;font-weight:400;font-size:27px;color:var(--ink);margin-bottom:8px;}
  .panel-subtitle{color:var(--ash);font-size:14px;font-weight:600;margin-bottom:26px;}

  .form-group{margin-bottom:18px;}
  label{display:block;margin-bottom:7px;color:var(--ink);font-weight:700;font-size:13.5px;}
  .input-icon-wrapper{position:relative;}
  .input-icon-wrapper i{
    position:absolute;top:50%;right:15px;transform:translateY(-50%);
    color:var(--ash);font-size:15px;
  }
  input{
    width:100%;
    padding:13px 44px 13px 15px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:14px;
    font-family:'Cairo',sans-serif;
    color:var(--ink);
    background:var(--mist);
    transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  input:focus{
    outline:none;
    border-color:var(--primary);
    background:#fff;
    box-shadow:0 0 0 3px rgba(226,98,42,.12);
  }

  .remember-forgot{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:24px;font-size:13.5px;font-weight:600;
  }
  .remember{display:flex;align-items:center;gap:7px;color:var(--ash);cursor:pointer;}
  .remember input{width:auto;accent-color:var(--primary);cursor:pointer;}
  .forgot-link{color:var(--ink);text-decoration:none;font-weight:700;background:none;border:none;font-family:inherit;font-size:13.5px;cursor:pointer;padding:0;}
  .forgot-link:hover{text-decoration:underline;}

  .btn{
    width:100%;padding:14px;background:var(--primary);color:#fff;border:none;
    border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
    font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:background .15s ease, transform .15s ease;
  }
  .btn:hover{background:var(--primary-dark);transform:translateY(-1px);}
  .btn:disabled{opacity:.65;cursor:not-allowed;transform:none;}

  .panel-footer-links{text-align:center;margin-top:22px;color:var(--ash);font-size:13.5px;font-weight:600;}
  .panel-footer-links a{color:var(--ink);text-decoration:none;font-weight:700;}
  .panel-footer-links a:hover{text-decoration:underline;}

  .link-back{
    display:inline-flex;align-items:center;gap:6px;background:none;border:none;
    color:var(--ash);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;padding:0;margin-bottom:18px;
  }
  .link-back:hover{color:var(--ink);}

  .loader{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .toast-container{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:10px;z-index:50;
    width:min(380px, calc(100% - 32px));
  }
  .toast{
    display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:10px;
    font-size:13.5px;font-weight:600;font-family:'Cairo',sans-serif;
    background:var(--ink);color:#fff;box-shadow:0 6px 18px rgba(43,24,16,.2);
    animation:toast-in .25s ease;
  }
  .toast.success i{color:#8fd9a8;}
  .toast.error i{color:#f3a99a;}
  .toast.toast-out{animation:toast-out .25s ease forwards;}
  @keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes toast-out{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(8px);}}

  .trust-footer{
    margin-top:30px;padding-top:20px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:12.5px;color:var(--ash);flex-wrap:wrap;
  }
  .trust-footer a{color:var(--ash);text-decoration:none;font-weight:600;}
  .trust-footer a:hover{color:var(--ink);}
  .trust-footer .dot{color:var(--line);}
  .trust-footer .contact-icons{display:inline-flex;gap:10px;}
  .trust-footer .contact-icons a{font-size:15px;}

  @media (max-width:860px){
    .auth-card{flex-direction:column;border-radius:18px;}
    .auth-aside{min-height:0;padding:30px 26px;}
    .steam-art{opacity:.7;}
    .logo-badge{padding:10px 14px;}
    .logo-badge img{height:26px;}
    .aside-tagline{font-size:13.5px;margin-top:14px;}
    .auth-panel{padding:36px 26px;}
    .home-pill{top:16px;right:16px;font-size:12.5px;padding:8px 14px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>

  <a href="index.html" class="home-pill"><i class="fas fa-house"></i> الرئيسية</a>

  <div class="auth-shell">
    <div class="auth-card">

      <aside class="auth-aside">
        <svg class="steam-art" viewBox="0 0 360 560" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke-linecap="round">
            <g transform="translate(66,140)">
              <path d="M0,92 C10,74 -8,58 2,40 C10,26 -6,12 4,-4 C10,-16 0,-26 6,-44" stroke="#FBF4EA" stroke-width="2" opacity="0.55"/>
              <path d="M24,84 C32,68 18,54 26,38 C32,26 20,14 26,-2" stroke="#E2622A" stroke-width="2" opacity="0.45"/>
            </g>
            <g transform="translate(284,288) scale(0.7)">
              <path d="M0,92 C10,74 -8,58 2,40 C10,26 -6,12 4,-4 C10,-16 0,-26 6,-44" stroke="#FBF4EA" stroke-width="2" opacity="0.4"/>
              <path d="M24,84 C32,68 18,54 26,38 C32,26 20,14 26,-2" stroke="#CC8A1E" stroke-width="2" opacity="0.4"/>
            </g>
            <g transform="translate(116,430) scale(0.85)">
              <path d="M0,92 C10,74 -8,58 2,40 C10,26 -6,12 4,-4 C10,-16 0,-26 6,-44" stroke="#FBF4EA" stroke-width="2" opacity="0.5"/>
              <path d="M24,84 C32,68 18,54 26,38 C32,26 20,14 26,-2" stroke="#E2622A" stroke-width="2" opacity="0.45"/>
            </g>
          </g>
        </svg>

        <div class="logo-badge">
          <img src="https://frozen-ordering.vercel.app/logo.png" alt="FrozenShop">
        </div>

        <div class="aside-copy">
          <p class="aside-tagline">نحافظ على الجودة وقت التجميد، عشان لما توصلك تكون بطعم البيت في أي وقت.</p>
        </div>
      </aside>

      <div class="auth-panel">

        <!-- Login view -->
        <div id="loginView">
          <h1>تسجيل الدخول</h1>
          <p class="panel-subtitle">أهلاً بك مجدداً في متجر الأطعمة المجمدة</p>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="email">البريد الإلكتروني</label>
              <div class="input-icon-wrapper">
                <input type="email" id="email" required placeholder="example@email.com" autocomplete="email">
                <i class="fas fa-envelope"></i>
              </div>
            </div>

            <div class="form-group">
              <label for="password">كلمة المرور</label>
              <div class="input-icon-wrapper">
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                <i class="fas fa-lock"></i>
              </div>
            </div>

            <div class="remember-forgot">
              <label class="remember">
                <input type="checkbox" id="remember">
                <span>تذكرني</span>
              </label>
              <button type="button" class="forgot-link" id="showForgotBtn">نسيت كلمة المرور؟</button>
            </div>

            <button type="submit" class="btn" id="submitBtn">
              <i class="fas fa-arrow-right-to-bracket"></i> دخول
            </button>
          </form>

          <div class="panel-footer-links">
            ليس لديك حساب؟ <a href="signup.html">سجل حساباً جديداً</a>
          </div>
        </div>

        <!-- Forgot password view -->
        <div id="forgotView" hidden>
          <button type="button" class="link-back" id="backToLoginBtn">
            <i class="fas fa-arrow-right"></i> رجوع لتسجيل الدخول
          </button>

          <h1>إعادة تعيين كلمة المرور</h1>
          <p class="panel-subtitle">أدخل بريدك الإلكتروني، وسنرسل لك رابط إعادة التعيين</p>

          <form id="forgotForm" onsubmit="handleForgotPassword(event)">
            <div class="form-group">
              <label for="resetEmail">البريد الإلكتروني</label>
              <div class="input-icon-wrapper">
                <input type="email" id="resetEmail" required placeholder="example@email.com" autocomplete="email">
                <i class="fas fa-envelope"></i>
              </div>
            </div>

            <button type="submit" class="btn" id="forgotSubmitBtn">
              <i class="fas fa-paper-plane"></i> إرسال رابط إعادة التعيين
            </button>
          </form>
        </div>

        <div class="trust-footer">
          <a href="privacy-policy.html">سياسة الخصوصية</a>
          <span class="dot">•</span>
          <a href="terms.html">الشروط والأحكام</a>
          <span class="dot">•</span>
          <span class="contact-icons">
            <a href="tel:+201001234567" title="اتصل بنا"><i class="fas fa-phone"></i></a>
            <a href="https://wa.me/201001234567" target="_blank" rel="noopener" title="واتساب"><i class="fab fa-whatsapp"></i></a>
          </span>
        </div>

      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // ---- Config — update with real values when ready ----
    var ADMIN_EMAIL = 'kevin.hany.08@hotmail.com';
    var PASSWORD_RESET_REDIRECT = window.location.origin + window.location.pathname.replace(/login\.html$/, 'reset-password.html');

    function redirectAfterLogin(email) {
      var target = (email || '').toLowerCase() === ADMIN_EMAIL ? 'admin.html' : 'index.html';
      window.location.href = target;
    }

    window.addEventListener('load', async function () {
      fsUtils.migrateLegacyKey('user', 'fs_user');
      fsUtils.migrateLegacyKey('rememberMe', 'fs_rememberMe');

      try {
        var sessionResult = await sb.auth.getSession();
        var session = sessionResult.data && sessionResult.data.session;

        if (session && session.user && session.user.email) {
          // Real, valid Supabase session — keep the local cache in sync and redirect.
          fsUtils.safeSetJSON('fs_user', {
            id: session.user.id,
            email: session.user.email,
            name: (session.user.user_metadata && session.user.user_metadata.full_name) || session.user.email.split('@')[0],
            joinDate: session.user.created_at
          });
          redirectAfterLogin(session.user.email);
        } else {
          // No real session — any cached fs_user is stale, so clear it.
          // This is what was forcing the login page to redirect even
          // after the actual session had ended.
          fsUtils.safeRemove('fs_user');
        }
      } catch (err) {
        console.warn('Session check failed:', err);
      }
    });

    function toggleView(showForgot) {
      document.getElementById('loginView').hidden = showForgot;
      document.getElementById('forgotView').hidden = !showForgot;
    }
    document.getElementById('showForgotBtn').addEventListener('click', function () { toggleView(true); });
    document.getElementById('backToLoginBtn').addEventListener('click', function () { toggleView(false); });

    async function handleLogin(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('submitBtn');

      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span> جاري التحقق من الحساب...';

      try {
        if (!email.includes('@')) throw new Error('صيغة البريد الإلكتروني غير صحيحة.');
        if (password.length < 6) throw new Error('كلمة المرور يجب ألا تقل عن 6 أحرف.');

        var result = await sb.auth.signInWithPassword({ email: email, password: password });
        if (result.error) throw result.error;

        var sessionUser = {
          id: result.data.user.id,
          email: result.data.user.email,
          name: (result.data.user.user_metadata && result.data.user.user_metadata.full_name) || email.split('@')[0],
          joinDate: result.data.user.created_at
        };

        fsUtils.safeSetJSON('fs_user', sessionUser);
        if (document.getElementById('remember').checked) {
          fsUtils.safeSetJSON('fs_rememberMe', true);
        }

        fsUtils.showToast('تم تسجيل الدخول بنجاح! جاري التوجيه...', 'success');
        setTimeout(function () { redirectAfterLogin(sessionUser.email); }, 1100);

      } catch (err) {
        fsUtils.showToast(err.message || 'حدث خطأ غير متوقع.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> دخول';
      }
    }

    async function handleForgotPassword(e) {
      e.preventDefault();
      var email = document.getElementById('resetEmail').value.trim();
      var btn = document.getElementById('forgotSubmitBtn');

      try {
        if (!email.includes('@')) throw new Error('صيغة البريد الإلكتروني غير صحيحة.');

        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> جاري الإرسال...';

        var result = await sb.auth.resetPasswordForEmail(email, { redirectTo: PASSWORD_RESET_REDIRECT });
        if (result.error) throw result.error;

        fsUtils.showToast('تم إرسال رابط إعادة التعيين، تحقق من بريدك الإلكتروني.', 'success');
        document.getElementById('forgotForm').reset();

      } catch (err) {
        fsUtils.showToast(err.message || 'حدث خطأ غير متوقع.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رابط إعادة التعيين';
      }
    }
  </script>
</body>
</html>
