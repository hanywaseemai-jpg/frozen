<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrozenShop | تجربة تسوق عصرية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb; /* أزرق براند */
            --primary-dark: #1e40af;
            --accent: #3b82f6;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --white: #ffffff;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== Header & Nav ===== */
        .header-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .header-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        .logo img { height: 48px; transition: transform 0.3s; }
        .logo:hover img { transform: scale(1.05); }

        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 50px 12px 20px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            font-family: 'Cairo';
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-container i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .actions { display: flex; align-items: center; gap: 15px; }

        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-icon .badge {
            position: absolute;
            top: -2px;
            left: -2px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 800;
        }

        /* ===== Hero Section ===== */
        .hero {
            padding: 40px 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            border-radius: var(--radius-lg);
            padding: 60px;
            display: flex;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
            min-height: 450px;
        }

        .hero-card::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            top: -100px;
            left: -100px;
        }

        .hero-content { flex: 1; z-index: 1; }
        .hero-content h1 { font-size: 52px; font-weight: 900; line-height: 1.2; margin-bottom: 20px; }
        .hero-content p { font-size: 18px; opacity: 0.9; margin-bottom: 35px; max-width: 500px; }

        .hero-btn {
            padding: 16px 40px;
            background: var(--white);
            color: var(--text-main);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .hero-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .hero-visual {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image-main {
            width: 380px;
            height: 380px;
            object-fit: cover;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: blobby 10s infinite alternate;
            border: 8px solid rgba(255,255,255,0.1);
        }

        @keyframes blobby {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            100% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
        }

        /* ===== Categories ===== */
        .cats-bar {
            padding: 20px 25px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-chip {
            padding: 10px 24px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }

        .cat-chip.active, .cat-chip:hover {
            background: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }

        /* ===== Product Cards ===== */
        .products-section { max-width: 1400px; margin: 0 auto; padding: 20px 25px 80px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .section-header h2 { font-size: 28px; font-weight: 800; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f5f9;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .img-wrapper {
            width: 100%;
            height: 220px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #f8fafc;
            position: relative;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .img-wrapper img { transform: scale(1.1); }

        .fav-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 2;
        }

        .fav-btn.active { color: #ef4444; }

        .content { padding: 15px 5px; }
        .cat-name { font-size: 12px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .p-name { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: var(--text-main); }
        
        .p-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .price { font-size: 20px; font-weight: 900; color: var(--text-main); }
        .price span { font-size: 12px; font-weight: 600; color: var(--text-muted); }

        .add-btn {
            background: var(--text-main);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Cairo';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover { background: var(--primary); transform: scale(1.05); }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-card { padding: 30px; flex-direction: column; text-align: center; }
            .hero-content h1 { font-size: 32px; }
            .hero-visual { display: none; }
            .search-container { order: 3; max-width: 100%; }
            .header-main { flex-wrap: wrap; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card { padding: 10px; }
            .img-wrapper { height: 160px; }
            .p-name { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header class="header-wrapper">
        <div class="header-main">
            <a href="index.html" class="logo">
                <img src="https://frozen-ordering.vercel.app/logo.png" alt="FrozenShop">
            </a>

            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="بتدور على إيه النهاردة؟" oninput="searchProducts()">
            </div>

            <div class="actions">
                <a href="favorites.html" class="btn-icon">
                    <i class="far fa-heart"></i>
                    <span class="badge" id="favBadge" style="display:none;">0</span>
                </a>
                <a href="cart.html" class="btn-icon">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="badge" id="cartBadge" style="display:none;">0</span>
                </a>
                <a href="login.html" class="btn-icon" id="userBtn">
                    <i class="far fa-user"></i>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-card">
                <div class="hero-content">
                    <h1>أكل طازة.. <br> بلمسة من التجميد.</h1>
                    <p>أجود أنواع الخضروات، اللحوم، والوجبات الجاهزة توصلك لحد باب البيت بجودة السوبر ماركت وأفضل.</p>
                    <a href="#products" class="hero-btn">
                        تسوق الآن
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
                <div class="hero-visual" id="heroVisual">
                    <!-- الصور هتتحط هنا بالـ JS -->
                </div>
            </div>
        </section>

        <nav class="cats-bar" id="categoriesGrid">
            <button class="cat-chip active" onclick="filterCategory('all')">الكل</button>
        </nav>

        <section class="products-section" id="products">
            <div class="section-header">
                <h2>أحدث المنتجات</h2>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- المنتجات هنا -->
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ufmzgobtjtetrxvewvxl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DEZTCSDOUIcSzs_t0tOAqA_HVOdy8As';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        async function init() {
            await loadCategories();
            await loadProducts();
            updateBadges();
        }

        async function loadCategories() {
            const { data } = await supabase.from('categories').select('*');
            if (data) {
                const grid = document.getElementById('categoriesGrid');
                data.forEach(cat => {
                    grid.innerHTML += `<button class="cat-chip" onclick="filterCategory('${cat.name}', this)">${cat.name}</button>`;
                });
            }
        }

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*').order('created_at', { ascending: false });
            if (data) {
                allProducts = data;
                renderProducts(data);
                if(data.length > 0) {
                    document.getElementById('heroVisual').innerHTML = `<img src="${data[0].image_url}" class="hero-image-main">`;
                }
            }
        }

        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = list.map(p => `
                <div class="product-card">
                    <button class="fav-btn ${favorites.includes(p.id) ? 'active' : ''}" onclick="toggleFav(${p.id})">
                        <i class="${favorites.includes(p.id) ? 'fas' : 'far'} fa-heart"></i>
                    </button>
                    <div class="img-wrapper" onclick="window.location.href='product-detail.html?id=${p.id}'">
                        <img src="${p.image_url}" alt="${p.name}">
                    </div>
                    <div class="content">
                        <span class="cat-name">${p.category}</span>
                        <h3 class="p-name">${p.name}</h3>
                        <div class="p-footer">
                            <div class="price">${p.price} <span>ج.م</span></div>
                            <button class="add-btn" onclick="addToCart(${p.id})">أضف للسلة</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            if(cat === 'all') renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.category === cat));
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function updateBadges() {
            document.getElementById('cartBadge').textContent = cart.length;
            document.getElementById('cartBadge').style.display = cart.length ? 'flex' : 'none';
            document.getElementById('favBadge').textContent = favorites.length;
            document.getElementById('favBadge').style.display = favorites.length ? 'flex' : 'none';
        }

        function addToCart(id) {
            const prod = allProducts.find(p => p.id === id);
            cart.push(prod);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateBadges();
            alert('تمت الإضافة للسلة');
        }

        function toggleFav(id) {
            if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateBadges();
            renderProducts(allProducts);
        }

        init();
    </script>
</body>
</html>
